<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Testimoni - Toko Buku Indah</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tambahan CSS sederhana agar gambar rapi */
        .banner-promo {
            width: 100%;
            max-width: 800px; /* Sesuaikan dengan lebar form */
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .formulir {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Toko Buku Indah</h1>
    <nav>
        <a href="index.html">Beranda</a>
        <a href="produk.html">Katalog</a>
        <a href="bedah-buku.html">Bedah Buku</a>
        <a href="testimoni.html">Testimoni</a>
        <a href="tampil-testimoni.html">Testimoni Pembeli</a> 
    </nav>
</header>

<main class="formulir">
    <img src="c:\Users\nabila nur indah\Downloads\tulip aesthetic __ tulip wallpaper.jpg" alt="Banner Pameran Buku" class="banner-promo">

    <h2>Berikan Testimoni Anda</h2>
    
    <form id="formTestimoni">
        <label for="nama">Nama:</label>
        <input type="text" id="nama" name="nama" required placeholder="Nama lengkap">

        <label for="asalsekolah">Asal Sekolah:</label>
        <input type="text" id="asalsekolah" name="asalsekolah" required placeholder="Masukkan nama sekolah">
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="email@example.com">

        <label for="rating">Rating (1-5):</label>
        <input type="number" id="rating" name="rating" min="1" max="5" required placeholder="Contoh: 5">

        <label for="pesan">Testimoni Anda:</label>
        <textarea id="pesan" name="pesan" required placeholder="Tulis pengalaman Anda..." rows="5"></textarea>

        <button type="submit">Kirim Testimoni</button>
    </form>
</main>

<footer>
    <p>&copy; 2026 Toko Buku Indah</p>
</footer>

<script>
    // Hanya gunakan SATU block script agar tidak bentrok
    document.getElementById('formTestimoni').addEventListener('submit', function(e) {
        e.preventDefault();

        // Mengambil data dari input
        const nama = document.getElementById('nama').value;
        const asalsekolah = document.getElementById('asalsekolah').value;
        const email = document.getElementById('email').value;
        const rating = document.getElementById('rating').value;
        const pesan = document.getElementById('pesan').value;

        // Menyusun data ke dalam objek
        const dataBaru = { 
            nama: nama, 
            sekolah: asalsekolah, 
            email: email, 
            rating: rating, 
            pesan: pesan 
        };
        
        // Ambil list dari localStorage dan pastikan tidak ada typo
        const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];

        // Tambahkan data baru ke array (push)
        testimoniList.push(dataBaru);

        // Simpan kembali ke localStorage
        localStorage.setItem('testimoniList', JSON.stringify(testimoniList));

        // Pindah ke halaman konfirmasi
        window.location.href = 'proses-testimoni.html';
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubungi Kami - Toko Saya</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        h2 { color: #333; }
        
        /* Form Styling */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1fr solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:hover { background: #218838; }

        /* Map Styling */
        .map-responsive { overflow: hidden; padding-bottom: 56.25%; position: relative; height: 0; border-radius: 8px; }
        .map-responsive iframe { left: 0; top: 0; height: 100%; width: 100%; position: absolute; border: 0; }

        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Hubungi Kami</h2>
    <div class="grid">
        
        <div>
            <h3>Alamat Toko</h3>
            <p><strong>📍 Toko Maju Jaya</strong><br>
            Jl. Contoh No. 123, Jakarta Selatan<br>
            DKI Jakarta, 12345</p>
            <p>📞 WhatsApp: 0812-3456-7890</p>
            
            <div class="map-responsive">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3966.255!2d106.824!3d-6.229!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNsKwMTMnNDQuNCJTIDEwNsKwNDknMjYuNCJF!5e0!3m2!1sid!2sid!4v1620000000000" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>

        <div>
            <h3>Kirim Pesan</h3>
            <form action="#">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" placeholder="Masukkan nama..." required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="email@contoh.com" required>
                </div>
                <div class="form-group">
                    <label>Pesan</label>
                    <textarea rows="5" placeholder="Tulis pesan Anda di sini..." required></textarea>
                </div>
                <button type="submit">Kirim Sekarang</button>
            </form>
        </div>

    </div>
</div>

</body>
</html>

    <button style="padding: 10px 20px; background-color: #333; color: white; border: none; border-radius: 5px; cursor: pointer;">
        🏠 Kembali ke Beranda
    </button>
</a>
